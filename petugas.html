<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadual Petugas | Gereja SDA Koporingan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* RESET & BASIC */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: #f8f9fb; color: #222; overflow-x: hidden; }

/* NAVBAR (Same as Home) */
.navbar { position: fixed; width: 100%; top: 0; padding: 20px 0; background: rgba(11, 29, 58, 0.95); backdrop-filter: blur(12px); z-index: 1000; }
.nav-inner { width: 90%; max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
.navbar img { height: 50px; }
.navbar ul { list-style: none; display: flex; gap: 25px; align-items: center; }
.navbar ul li a { text-decoration: none; color: white; font-weight: 500; }
.social-top a { color: white; margin-left: 15px; font-size: 20px; }
.menu-toggle { display: none; font-size: 28px; color: white; cursor: pointer; }

/* BANNER */
.banner { padding-top: 150px; padding-bottom: 50px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
.banner h1 { font-family: 'Montserrat', sans-serif; font-size: 40px; font-weight: 800; text-transform: uppercase; color: #0b1d3a; }

/* PETUGAS CONTENT (Your existing design) */
.section { padding: 60px 0; }
.container { width: 90%; max-width: 1200px; margin: auto; }
.tabs-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
.tab-btn { padding: 12px 35px; font-size: 16px; font-weight: 600; color: #0b1d3a; border: 2px solid #0b1d3a; border-radius: 50px; cursor: pointer; background: transparent; transition: 0.3s; }
.tab-btn.active { background: #0b1d3a; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.5s; }
.petugas-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
.petugas-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
.petugas-item { background: #f8f9fb; padding: 20px; border-radius: 12px; border-left: 4px solid #0b1d3a; }
.petugas-item span { font-size: 11px; color: #666; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 5px; }
.petugas-item strong { font-size: 16px; color: #111; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 900px) {
    .menu-toggle { display: block; }
    .navbar ul { position: absolute; top: 75px; right: 5%; background: #0b1d3a; width: 200px; flex-direction: column; padding: 20px; border-radius: 12px; display: none; }
    .navbar ul.active { display: flex; }
}

.footer { text-align: center; padding: 30px; background: #fff; font-size: 14px; margin-top: 50px; }
</style>
</head>
<body>

<div class="navbar">
    <div class="nav-inner">
        <img src="logo-sda.png" alt="SDA Logo">
        <ul id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="ahli-lembaga.html">Ahli Lembaga</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="sejarah.html">Sejarah</a></li>
        </ul>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="social-top">
                <a href="https://www.facebook.com/share/187svoWKJs/?mibextid=wwXIfr" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.youtube.com/@GerejaSDAKoporingan" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="menu-toggle" id="menu-toggle">☰</div>
        </div>
    </div>
</div>

<div class="banner">
    <h1>Petugas Sabat</h1>
    <p>Minggu ini: 28 Februari 2026</p>
</div>

<div class="section">
    <div class="container">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="openTab(event, 'ss')">Sekolah Sabat</button>
            <button class="tab-btn" onclick="openTab(event, 'khotbah')">Kebaktian Khotbah</button>
        </div>

        <div id="ss" class="tab-content active">
            <div class="petugas-card">
                <div class="petugas-list">
                    <div class="petugas-item"><span>Pemimpin Nyanyi</span><strong>Cik Efy Barangking</strong></div>
                    <div class="petugas-item"><span>Pemimpin Acara</span><strong>En Erlandson Keith Subin</strong></div>
                </div>
            </div>
        </div>

        <div id="khotbah" class="tab-content">
            <div class="petugas-card">
                <div class="petugas-list">
                    <div class="petugas-item" style="grid-column: 1 / -1;"><span>Pengkhotbah</span><strong>Elder Joseph Molondoi</strong></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2026–2027 Gereja SDA Koporingan</p>
</footer>

<audio id="bg-music" autoplay loop><source src="music.mp3" type="audio/mpeg"></audio>

<script>
function openTab(evt, name) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    evt.currentTarget.classList.add('active');
}
document.getElementById("menu-toggle").addEventListener("click", () => {
    document.getElementById("nav-links").classList.toggle("active");
});
// Music Memory
const bgMusic = document.getElementById('bg-music');
const savedTime = sessionStorage.getItem('musicTime');
if (savedTime) bgMusic.currentTime = parseFloat(savedTime);
window.addEventListener('beforeunload', () => { sessionStorage.setItem('musicTime', bgMusic.currentTime); });
document.addEventListener('click', () => { if (bgMusic.paused) bgMusic.play(); });
</script>
</body>
</html>
