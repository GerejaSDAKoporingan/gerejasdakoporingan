<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahli Lembaga Gereja | Gereja SDA Koporingan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

html {
    scroll-behavior: smooth;
    scroll-padding-top: 90px;
}

body {
    background: #ffffff;
    color: #222;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
}

/* NAVBAR - Semi-transparent glass effect! */
.navbar {
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    padding: 20px 0;
    background: rgba(11, 29, 58, 0.85); /* Clear Navblue */
    backdrop-filter: blur(12px); /* Frosted glass blur */
    -webkit-backdrop-filter: blur(12px); /* For Safari support */
    z-index: 1000;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.nav-inner {
    width: 90%;
    max-width: 1100px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar img {
    height: 50px;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 25px;
}

.navbar ul li a {
    text-decoration: none;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

.navbar ul li a:hover {
    color: #d63b3b;
}

/* HAMBURGER */
.menu-toggle {
    display: none;
    font-size: 28px;
    color: white;
    cursor: pointer;
}

/* BANNER */
.banner {
    padding-top: 140px;
    padding-bottom: 60px;
    background: #f8f9fb;
    text-align: center;
}

/* UPDATED TITLE HEADER (Bold, Glowing, Montserrat) */
.banner h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 45px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #0b1d3a;
    text-shadow: 0 0 15px rgba(11, 29, 58, 0.2), 0 0 30px rgba(11, 29, 58, 0.1); /* Dark blue glow for light background */
}

.banner p {
    margin-top: 10px;
    font-family: 'Montserrat', sans-serif;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 14px;
    color: #555;
}

/* SECTION */
.section {
    padding: 40px 0 80px 0;
}

/* FULL SCREEN IMAGES */
.full-screen-wrapper {
    width: 100%;
    margin-bottom: 30px;
    text-align: center;
}

.full-screen-wrapper img {
    width: 100%;
    max-width: 100%; /* Removes the limit so it spans edge-to-edge */
    display: block; /* Removes weird spacing at the bottom of images */
}

/* FADE ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* MOBILE */
@media (max-width: 900px) {

    .menu-toggle {
        display: block;
    }

    /* MOBILE DROPDOWN - Clear glass effect */
    .navbar ul {
        position: absolute;
        top: 75px;
        right: 5%;
        background: rgba(11, 29, 58, 0.9); /* Clear Navblue */
        backdrop-filter: blur(15px); /* Frosted glass blur */
        -webkit-backdrop-filter: blur(15px);
        width: 220px;
        flex-direction: column;
        align-items: flex-end;
        padding: 20px 25px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.1); 
    }

    .navbar ul.active {
        display: flex;
    }

    .navbar ul li {
        width: 100%;
        margin-bottom: 18px;
    }

    .navbar ul li:last-child {
        margin-bottom: 0;
    }

    .navbar ul li a {
        display: block;
        text-align: right;
        font-size: 16px;
    }

    .banner h1 {
        font-size: 30px;
    }
}

/* FOOTER STYLING */
.footer {
    text-align: center;
    padding: 30px 0;
    background: #f8f9fb;
    color: #555;
    font-size: 14px;
    line-height: 1.6;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="nav-inner">
        <img src="logo-sda.png" alt="SDA Logo">
        <div class="menu-toggle" id="menu-toggle">☰</div>
        <ul id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#pengumuman">Pengumuman</a></li>
            <li><a href="index.html#petugas">Petugas</a></li>
            <li><a href="ahli-lembaga.html">Ahli Lembaga</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="sejarah.html">Sejarah</a></li>
            <li><a href="hubungi-kami.html">Hubungi Kami</a></li>
        </ul>
    </div>
</div>

<section class="banner">
    <div class="container">
        <h1>Ahli Lembaga Gereja</h1>
        <p>Struktur Organisasi | 2026 – 2027</p>
    </div>
</section>

<section class="section">
    <div class="full-screen-wrapper fade">
        <img src="org-1.jpg" alt="Struktur Organisasi 1" loading="lazy">
    </div>

    <div class="full-screen-wrapper fade">
        <img src="org-2.jpg" alt="Struktur Organisasi 2" loading="lazy">
    </div>

</section>

<footer class="footer">
    <div class="container">
        <p>
            © 2026–2027 Gereja SDA Koporingan<br>
            Developed and maintained by Jabatan Multimedia & Penerbitan<br>
            Erlandson Keith Subin
        </p>
    </div>
</footer>

<audio id="bg-music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// --- MUSIC SMART MEMORY ---
const bgMusic = document.getElementById('bg-music');
const savedTime = sessionStorage.getItem('musicTime');
if (savedTime !== null) {
    bgMusic.currentTime = parseFloat(savedTime);
}

let playPromise = bgMusic.play();
if (playPromise !== undefined) {
    playPromise.catch(error => {
        console.log("Autoplay blocked. Waiting for click.");
    });
}

document.addEventListener('click', function() {
    if (bgMusic.paused) {
        bgMusic.play();
    }
});

window.addEventListener('beforeunload', function() {
    sessionStorage.setItem('musicTime', bgMusic.currentTime);
});


// Mobile Menu Toggle
document.getElementById("menu-toggle").addEventListener("click", function() {
    document.getElementById("nav-links").classList.toggle("active");
});

// Close menu when clicking a link (mobile fix)
const menuLinks = document.querySelectorAll("#nav-links a");

menuLinks.forEach(link => {
    link.addEventListener("click", function() {
        document.getElementById("nav-links").classList.remove("active");
    });
});

// Fade Animation
const fadeElements = document.querySelectorAll('.fade');

function checkFade() {
    const triggerBottom = window.innerHeight * 0.85;

    fadeElements.forEach(el => {
        const boxTop = el.getBoundingClientRect().top;
        if (boxTop < triggerBottom) {
            el.classList.add('show');
        }
    });
}
    
window.addEventListener('scroll', checkFade);
window.addEventListener('load', checkFade);

</script>

</body>
</html>
